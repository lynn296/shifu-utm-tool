<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiFu UTM 產生器</title>
<style>
  :root {
    --shifu-red: #EA1345;
    --shifu-red-dark: #c50f38;
    --shifu-black: #272727;
    --shifu-gray: #484848;
    --shifu-bg: #F4F4F4;
    --card-bg: #ffffff;
    --text: #272727;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --border-soft: #f0f0f0;
    --positive: #0a9e60;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-weight: 700;
    background: var(--shifu-bg);
    color: var(--text);
    padding: 0 0 40px;
    min-height: 100vh;
    line-height: 1.6;
  }
  /* Header 品牌列 */
  .brand-header {
    background: var(--shifu-black);
    color: #fff;
    padding: 22px 32px;
    position: relative;
    margin-bottom: 28px;
  }
  .brand-header::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    width: 6px; height: 100%;
    background: var(--shifu-red);
  }
  .brand-header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-header h1 {
    font-size: 22px;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .brand-tag {
    background: var(--shifu-red);
    color: #fff;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 26px 28px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  .card-sticky {
    position: sticky;
    top: 24px;
  }
  .card-title {
    font-size: 14px;
    color: var(--shifu-black);
    margin-bottom: 18px;
    padding-left: 10px;
    border-left: 3px solid var(--shifu-red);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 12px;
    color: var(--shifu-gray);
    margin-bottom: 8px;
    display: block;
    letter-spacing: 0.5px;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    background: #fff;
    transition: all 0.2s;
    outline: none;
    color: var(--text);
  }
  input[type="text"]:focus {
    border-color: var(--shifu-red);
    box-shadow: 0 0 0 3px rgba(234,19,69,0.08);
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    padding: 6px 13px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--shifu-gray);
    user-select: none;
  }
  .chip:hover {
    border-color: var(--shifu-red);
    color: var(--shifu-red);
  }
  .chip.active {
    background: var(--shifu-red);
    color: #fff;
    border-color: var(--shifu-red);
  }
  .chip.active:hover {
    background: var(--shifu-red-dark);
    border-color: var(--shifu-red-dark);
  }
  .output-section {
    max-width: 1100px;
    margin: 20px auto 0;
    padding: 0 20px;
  }
  .output-card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 28px;
    border: 1px solid var(--border);
    border-top: 3px solid var(--shifu-red);
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  .url-preview {
    background: #fafafa;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 13px;
    word-break: break-all;
    line-height: 1.7;
    font-weight: 700;
    min-height: 44px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .url-preview .param-source { color: #d97706; }
  .url-preview .param-medium { color: #7c3ebd; }
  .url-preview .param-campaign { color: var(--positive); }
  .url-preview .param-base { color: var(--text-muted); }
  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--shifu-black);
    color: #fff;
  }
  .btn-primary:hover { background: #000; }
  .btn-secondary {
    background: #fff;
    color: var(--shifu-gray);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--shifu-gray);
    color: var(--shifu-black);
  }
  .btn-lihi {
    background: var(--shifu-red);
    color: #fff;
  }
  .btn-lihi:hover { background: var(--shifu-red-dark); }
  .btn-lihi-manual {
    background: #fff;
    color: var(--shifu-red);
    border: 1.5px solid var(--shifu-red);
  }
  .btn-lihi-manual:hover {
    background: var(--shifu-red);
    color: #fff;
  }
  .btn-search {
    background: #fff;
    color: var(--shifu-gray);
    border: 1.5px solid var(--border);
  }
  .btn-search:hover {
    border-color: var(--shifu-black);
    color: var(--shifu-black);
    background: #fafafa;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .lihi-result {
    margin-top: 14px;
    padding: 12px 16px;
    background: #fff1f4;
    border: 1.5px solid #fccfd9;
    border-radius: 6px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 10px;
    word-break: break-all;
  }
  .lihi-result.show { display: flex; }
  .lihi-result a {
    color: var(--shifu-red);
    text-decoration: none;
    font-weight: 700;
  }
  .lihi-result a:hover { text-decoration: underline; }
  .lihi-copy-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: none;
    background: var(--shifu-red);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .lihi-copy-btn:hover { background: var(--shifu-red-dark); }
  .history-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .history-title {
    font-size: 13px;
    color: var(--shifu-gray);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-item {
    padding: 10px 14px;
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    word-break: break-all;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.5;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .history-item:hover {
    background: #fff;
    border-color: var(--shifu-red);
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--shifu-black);
    color: #fff;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    border-left: 3px solid var(--shifu-red);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .kol-input-wrap {
    display: none;
    margin-top: 8px;
  }
  .kol-input-wrap.show { display: block; }
  .campaign-source-auto {
    display: inline-block;
    padding: 6px 13px;
    border-radius: 4px;
    background: #fff1f4;
    border: 1.5px solid #fccfd9;
    font-size: 13px;
    color: var(--shifu-red);
    font-weight: 700;
  }
  .custom-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
  }
  .custom-input-row input {
    flex: 1;
    padding: 7px 12px;
    font-size: 13px;
  }
  .lihi-error {
    margin-top: 10px;
    padding: 10px 14px;
    background: #fff1f4;
    border: 1.5px solid var(--shifu-red);
    border-radius: 6px;
    font-size: 13px;
    color: var(--shifu-red);
    display: none;
  }
  .lihi-error.show { display: block; }
  .wish-card {
    background: linear-gradient(135deg, #fff 0%, #fff8fa 100%);
    border: 1px solid var(--border);
    border-left: 4px solid var(--shifu-red);
    border-radius: 10px;
    padding: 24px 28px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  .wish-header { margin-bottom: 16px; }
  .wish-title {
    font-size: 16px;
    color: var(--shifu-black);
    margin-bottom: 4px;
  }
  .wish-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .wish-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .wish-form textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    background: #fff;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: all 0.2s;
    color: var(--text);
    line-height: 1.6;
  }
  .wish-form textarea:focus {
    border-color: var(--shifu-red);
    box-shadow: 0 0 0 3px rgba(234,19,69,0.08);
  }
  .wish-form button { align-self: flex-start; }
  @media (max-width: 768px) {
    body { padding: 0 0 24px; }
    .brand-header { padding: 16px 20px; margin-bottom: 16px; }
    .brand-header h1 { font-size: 18px; }
    .container { padding: 0 14px; }
    .output-section { padding: 0 14px; }
    .grid { grid-template-columns: 1fr; }
    .card-sticky { position: static; }
  }
</style>
</head>
<body>

<header class="brand-header">
  <div class="brand-header-inner">
    <h1>ShiFu UTM 生產器</h1>
    <span class="brand-tag">MARKETING</span>
  </div>
</header>

<div class="container">
<div class="grid">
  <!-- 左側：基本設定 -->
  <div class="card card-sticky">
    <div class="card-title">基本設定</div>

    <div class="field">
      <label class="field-label">目標網址</label>
      <input type="text" id="baseUrl" value="https://shifu.tw/course/details/" placeholder="https://shifu.tw/course/details/xxx">
      <div class="chips" id="slugChips" style="margin-top:8px;"></div>
    </div>

    <div class="field">
      <label class="field-label">Source（來源）</label>
      <div class="chips" id="sourceChips"></div>
    </div>

    <div class="field">
      <label class="field-label">Medium（媒介）</label>
      <div class="chips" id="mediumChips"></div>
    </div>
  </div>

  <!-- 右側：Campaign 設定 -->
  <div class="card">
    <div class="card-title">Campaign 設定</div>

    <div class="field">
      <label class="field-label">日期（4 碼）</label>
      <input type="text" id="dateInput" maxlength="4" placeholder="0426">
    </div>

    <div class="field">
      <label class="field-label">專案代號</label>
      <div class="chips" id="projectChips"></div>
      <div class="custom-input-row">
        <input type="text" id="projectCustom" placeholder="自訂專案代號">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Campaign 來源</label>
      <div id="campaignSourceDisplay">
        <span class="campaign-source-auto" id="campaignSourceAuto">—</span>
      </div>
      <div class="kol-input-wrap" id="kolWrap">
        <input type="text" id="kolName" placeholder="輸入 KOL 名字">
      </div>
    </div>

    <div class="field">
      <label class="field-label">形式（選填）</label>
      <div class="chips" id="formatChips"></div>
    </div>

    <div class="field">
      <label class="field-label">內容（選填）</label>
      <div class="chips" id="contentChips"></div>
    </div>

    <div class="field">
      <label class="field-label">其他備註（選填）</label>
      <input type="text" id="noteInput" placeholder="自由輸入">
    </div>
  </div>
</div>
</div>

<!-- 輸出區 -->
<div class="output-section">
  <div class="output-card">
    <div class="field-label" style="margin-bottom:10px;">完整 UTM 網址預覽</div>
    <div class="url-preview" id="urlPreview"></div>

    <div class="buttons">
      <button class="btn btn-primary" onclick="copyUrl()">複製網址</button>
      <button class="btn btn-lihi" id="lihiBtn" onclick="createLihi()">自動產出短連結</button>
      <button class="btn btn-lihi-manual" id="lihiManualBtn" onclick="createLihiManual()">半自動短連結（可修改）</button>
      <button class="btn btn-search" onclick="searchOnLihi()">🔍 到 Lihi 找此連結</button>
      <button class="btn btn-secondary" onclick="resetAll()">清除重填</button>
    </div>

    <div class="lihi-result" id="lihiResult">
      <span>短網址：<a id="lihiUrl" href="#" target="_blank"></a></span>
      <button class="lihi-copy-btn" onclick="copyLihi()">複製</button>
    </div>
    <div class="lihi-error" id="lihiError"></div>

    <div class="history-section">
      <div class="history-title">
        <span>最近紀錄</span>
        <button class="btn btn-secondary" style="padding:4px 12px;font-size:12px;" onclick="clearHistory()">清除紀錄</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<!-- 許願箱 -->
<div class="output-section">
  <div class="wish-card">
    <div class="wish-header">
      <div>
        <div class="wish-title">💡 工具許願箱</div>
        <div class="wish-subtitle">有想要的新功能？填下來，會直接發到 Lynn 的 Google Chat</div>
      </div>
    </div>
    <div class="wish-form">
      <input type="text" id="wishName" placeholder="你的名字（選填）">
      <textarea id="wishContent" placeholder="想要什麼功能？遇到什麼問題？盡量寫～" rows="3"></textarea>
      <button class="btn btn-lihi" id="wishBtn" onclick="submitWish()">送出許願</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SOURCES = ['fb','ig','th','dc','kol','yt','google','line','edm','sms','event'];
const SOURCE_MEDIUMS = {
  fb: ['ads','post'],
  ig: ['post','ads'],
  th: ['post'],
  dc: ['post'],
  kol: ['podcast','fb','ig','yt'],
  yt: ['post','ads','profile'],
  google: ['cpc'],
  line: ['push'],
  edm: ['push'],
  sms: ['push'],
  event: ['event']
};
const PROJECTS = ['rich','joey_short','Hgym','superai','paddy','rifat','simple','stock-ta','freedom'];
const FORMATS = ['trailer','shorts','preview','ppal','post','video','stories','gif'];
const CONTENTS = ['story-success','story-case','know-one','know-multi','countdown'];
const SLUGS = ['office','japanese2','rifat','flower','Hgym','rich','simple','shorts','writing','stock-taf','freedom'];

let state = {
  source: '',
  medium: '',
  project: '',
  format: '',
  content: ''
};

// Init date
const now = new Date();
document.getElementById('dateInput').value =
  String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');

function renderChips(containerId, options, stateKey, allowDeselect) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  options.forEach(opt => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (state[stateKey] === opt ? ' active' : '');
    chip.textContent = opt;
    chip.onclick = () => {
      if (allowDeselect && state[stateKey] === opt) {
        state[stateKey] = '';
      } else {
        state[stateKey] = opt;
      }
      renderChips(containerId, options, stateKey, allowDeselect);
      if (stateKey === 'source') onSourceChange();
      updatePreview();
    };
    c.appendChild(chip);
  });
}

function onSourceChange() {
  const s = state.source;
  const mediums = SOURCE_MEDIUMS[s] || [];
  state.medium = mediums[0] || '';
  renderChips('mediumChips', mediums, 'medium', false);

  // Campaign source
  const kolWrap = document.getElementById('kolWrap');
  const autoLabel = document.getElementById('campaignSourceAuto');
  if (s === 'kol') {
    kolWrap.classList.add('show');
    autoLabel.textContent = 'kol';
  } else {
    kolWrap.classList.remove('show');
    document.getElementById('kolName').value = '';
    autoLabel.textContent = s || '—';
  }
}

function getCampaignSource() {
  const s = state.source;
  if (s === 'kol') {
    const name = document.getElementById('kolName').value.trim();
    return name ? 'kol_' + name : 'kol';
  }
  return s;
}

function getCampaign() {
  const parts = [
    document.getElementById('dateInput').value.trim(),
    state.project || document.getElementById('projectCustom').value.trim(),
    getCampaignSource(),
    state.format,
    state.content,
    document.getElementById('noteInput').value.trim()
  ];
  return parts.filter(Boolean).join('_');
}

function getFullUrl() {
  const base = document.getElementById('baseUrl').value.trim();
  const campaign = getCampaign();
  const source = state.source;
  const medium = state.medium;
  if (!base || !source || !campaign) return '';
  return base + (base.includes('?') ? '&' : '?') +
    'affcode=' + encodeURIComponent(campaign) +
    '&utm_source=' + encodeURIComponent(source) +
    '&utm_medium=' + encodeURIComponent(medium) +
    '&utm_campaign=' + encodeURIComponent(campaign);
}

function updatePreview() {
  const el = document.getElementById('urlPreview');
  const base = document.getElementById('baseUrl').value.trim();
  const campaign = getCampaign();
  const source = state.source;
  const medium = state.medium;

  if (!source || !campaign) {
    el.innerHTML = '<span style="color:#aaa;">請選擇 Source 並填寫 Campaign 欄位</span>';
    return;
  }

  const sep = base.includes('?') ? '&' : '?';
  el.innerHTML =
    '<span class="param-base">' + escHtml(base) + sep + '</span>' +
    'affcode=<span class="param-campaign">' + escHtml(campaign) + '</span>' +
    '&amp;utm_source=<span class="param-source">' + escHtml(source) + '</span>' +
    '&amp;utm_medium=<span class="param-medium">' + escHtml(medium) + '</span>' +
    '&amp;utm_campaign=<span class="param-campaign">' + escHtml(campaign) + '</span>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyUrl() {
  const url = getFullUrl();
  if (!url) return showToast('請先完成欄位填寫');
  navigator.clipboard.writeText(url).then(() => {
    showToast('已複製！');
    addHistory(url);
  });
}

async function createLihi() {
  const url = getFullUrl();
  if (!url) return showToast('請先完成欄位填寫');
  const btn = document.getElementById('lihiBtn');
  const errEl = document.getElementById('lihiError');
  btn.disabled = true;
  btn.textContent = '建立中…';
  errEl.classList.remove('show');

  try {
    const res = await fetch('https://app.lihi.io/api/v1/url', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'x-api-key:pAFAeo4FkmAit7UM1Z5SzCzCvPy6S4aK9QO9tj2R'
      },
      body: JSON.stringify({ longUrl: url, tags: 'shifu-utm', domain: 'shifuclass.com' })
    });
    const data = await res.json();
    if (data.result === 'success' && data.url) {
      const lihiResult = document.getElementById('lihiResult');
      const lihiUrlEl = document.getElementById('lihiUrl');
      lihiUrlEl.href = data.url;
      lihiUrlEl.textContent = data.url;
      lihiResult.classList.add('show');
      addHistory(url);
    } else {
      errEl.textContent = 'Lihi 回傳錯誤：' + (data.message || JSON.stringify(data));
      errEl.classList.add('show');
    }
  } catch (e) {
    errEl.textContent = '網路錯誤：' + e.message;
    errEl.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = '自動產出短連結';
}

function createLihiManual() {
  const url = getFullUrl();
  if (!url) return showToast('請先完成欄位填寫');
  navigator.clipboard.writeText(url).then(() => {
    showToast('已複製網址！正在開啟 Lihi 後台...');
    addHistory(url);
    setTimeout(() => {
      window.open('https://app.lihi.io/admin', '_blank');
    }, 500);
  });
}

function searchOnLihi() {
  const campaign = getCampaign();
  if (!campaign) return showToast('請先填寫 Campaign 欄位');
  navigator.clipboard.writeText(campaign).then(() => {
    showToast('Campaign 已複製！在 Lihi 按「進階搜尋」貼到 UTM 欄位');
    setTimeout(() => {
      window.open('https://app.lihi.io/admin', '_blank');
    }, 500);
  });
}

function copyLihi() {
  const url = document.getElementById('lihiUrl').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('短網址已複製！'));
}

function addHistory(url) {
  let hist = JSON.parse(localStorage.getItem('shifu_utm_history') || '[]');
  hist = hist.filter(h => h !== url);
  hist.unshift(url);
  if (hist.length > 8) hist = hist.slice(0, 8);
  localStorage.setItem('shifu_utm_history', JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const hist = JSON.parse(localStorage.getItem('shifu_utm_history') || '[]');
  if (!hist.length) {
    list.innerHTML = '<div style="color:#aaa;font-size:12px;">尚無紀錄</div>';
    return;
  }
  list.innerHTML = hist.map(url =>
    '<div class="history-item" onclick="copyHistoryItem(this)" data-url="' + escAttr(url) + '">' + escHtml(url) + '</div>'
  ).join('');
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyHistoryItem(el) {
  navigator.clipboard.writeText(el.dataset.url).then(() => showToast('已複製！'));
}

function clearHistory() {
  localStorage.removeItem('shifu_utm_history');
  renderHistory();
}

async function submitWish() {
  const name = document.getElementById('wishName').value.trim() || '匿名';

  if (!content) return showToast('請寫下你想許什麼願');

    showToast('Webhook 尚未設定，請聯絡 Lynn');

  btn.disabled = true;

function showToast(msg) {

}

// Listen to inputs for live preview
['baseUrl','dateInput','projectCustom','kolName','noteInput'].forEach(id => {

      state.project = '';

    }

});

// Slug quick buttons
function renderSlugChips() {
  const c = document.getElementById('slugChips');
  c.innerHTML = '';
  SLUGS.forEach(slug => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = slug;
    chip.onclick = () => {
      document.getElementById('baseUrl').value = 'https://shifu.tw/course/details/' + slug;
      updatePreview();
    };
    c.appendChild(chip);
  });
}
